<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HATERS ANON - Анонимные вопросы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Контейнеры */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Шапка */
        .header {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff4d4d, #f9cb28);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            font-size: 14px;
            color: #ff4d4d;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }

        /* Кнопки */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff4d4d, #ff6b4d);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 77, 77, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-danger {
            background: rgba(255, 77, 77, 0.2);
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
        }

        /* Карточки */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Формы */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #ff4d4d;
        }

        /* Сетка пользователей */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.1);
            border-color: #ff4d4d;
        }

        .user-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        /* Вопросы */
        .question-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 3px solid #ff4d4d;
        }

        .question-text {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .question-meta {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: space-between;
        }

        .badge {
            background: #ff4d4d;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Табы */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: #ff4d4d;
            color: white;
        }

        .tab:not(.active):hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Поиск */
        .search-bar {
            margin-bottom: 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: white;
            font-size: 16px;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0a0a0a);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: #10b981;
        }

        .toast.error {
            background: #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Админ панель */
        .admin-panel {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .admin-table {
            width: 100%;
            overflow-x: auto;
        }

        .admin-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th, .admin-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-table th {
            background: rgba(255, 77, 77, 0.2);
        }

        .telegram-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }

        .telegram-confirmed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        /* Профиль */
        .profile-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ff4d4d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                HATERS ANON <span>⚡</span>
            </div>
            <div id="auth-section"></div>
        </div>
    </div>

    <div class="container" id="app">
        <div id="content"></div>
    </div>

    <!-- Модальное окно для вопроса -->
    <div id="questionModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Задать вопрос</h2>
            <div class="form-group">
                <label>Ваш вопрос</label>
                <textarea id="questionText" rows="4" placeholder="Введите ваш анонимный вопрос..."></textarea>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                <button class="btn btn-primary" id="sendQuestionBtn">Отправить</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Импорты Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, getDoc, setDoc, doc, updateDoc, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCFnjivHF82OH0e5o5mnZp1_1UGkO63_QE",
            authDomain: "hatersanon.firebaseapp.com",
            projectId: "hatersanon",
            storageBucket: "hatersanon.firebasestorage.app",
            messagingSenderId: "759284962705",
            appId: "1:759284962705:web:e3fe811230dd9bdee63630",
            measurementId: "G-XPEHPWXQH0"
        };

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Глобальные переменные
        let currentUser = null;
        let currentUserData = null;
        let selectedUser = null;

        // Вспомогательные функции
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Регистрация/обновление пользователя
        async function registerUser(user, telegramNickname, firstName, lastName) {
            const userRef = doc(db, 'users', user.uid);
            const userData = {
                email: user.email,
                firstName: firstName,
                lastName: lastName,
                telegramNickname: telegramNickname,
                telegramVerified: false,
                emailVerified: user.emailVerified,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            await setDoc(userRef, userData, { merge: true });
            return userData;
        }

        // Проверка, зарегистрирован ли пользователь
        async function checkUserRegistration(user) {
            const userRef = doc(db, 'users', user.uid);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                return userSnap.data();
            }
            return null;
        }

        // Вход через Google
        async function signInWithGoogle() {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                // Проверяем, есть ли уже пользователь в БД
                let userData = await checkUserRegistration(user);
                
                if (!userData) {
                    // Новый пользователь - запрашиваем данные
                    showRegistrationModal(user);
                } else if (!userData.telegramVerified) {
                    showToast('Ваш аккаунт ожидает подтверждения Telegram администратором', 'error');
                } else {
                    showToast('Добро пожаловать!', 'success');
                    loadMainContent();
                }
            } catch (error) {
                console.error('Ошибка входа:', error);
                showToast('Ошибка входа: ' + error.message, 'error');
            }
        }

        // Модальное окно регистрации
        function showRegistrationModal(user) {
            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>Завершение регистрации</h2>
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="regFirstName" placeholder="Ваше имя" required>
                    </div>
                    <div class="form-group">
                        <label>Фамилия</label>
                        <input type="text" id="regLastName" placeholder="Ваша фамилия" required>
                    </div>
                    <div class="form-group">
                        <label>Telegram Nickname (без @)</label>
                        <input type="text" id="regTelegram" placeholder="username" required>
                        <small style="color: rgba(255,255,255,0.5);">Администратор подтвердит ваш Telegram вручную</small>
                    </div>
                    <div style="display: flex; gap: 10px; justify-content: flex-end;">
                        <button class="btn btn-secondary" id="cancelRegBtn">Отмена</button>
                        <button class="btn btn-primary" id="completeRegBtn">Завершить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('cancelRegBtn').onclick = () => {
                signOut(auth);
                modal.remove();
            };
            
            document.getElementById('completeRegBtn').onclick = async () => {
                const firstName = document.getElementById('regFirstName').value.trim();
                const lastName = document.getElementById('regLastName').value.trim();
                const telegramNickname = document.getElementById('regTelegram').value.trim();
                
                if (!firstName || !lastName || !telegramNickname) {
                    showToast('Заполните все поля', 'error');
                    return;
                }
                
                await registerUser(user, telegramNickname, firstName, lastName);
                modal.remove();
                showToast('Регистрация завершена! Ожидайте подтверждения Telegram', 'success');
                loadMainContent();
            };
        }

        // Выход
        async function logout() {
            await signOut(auth);
            currentUser = null;
            currentUserData = null;
            renderAuthSection();
            renderContent();
        }

        // Получить всех пользователей
        async function getAllUsers() {
            const usersRef = collection(db, 'users');
            const snapshot = await getDocs(usersRef);
            return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        }

        // Поиск пользователей
        async function searchUsers(searchTerm) {
            const users = await getAllUsers();
            if (!searchTerm) return users;
            const term = searchTerm.toLowerCase();
            return users.filter(user => 
                user.firstName?.toLowerCase().includes(term) || 
                user.lastName?.toLowerCase().includes(term)
            );
        }

        // Отправить вопрос
        async function sendQuestion(toUserId, text) {
            if (!text.trim()) {
                showToast('Введите вопрос', 'error');
                return;
            }
            
            try {
                await addDoc(collection(db, 'questions'), {
                    fromUserId: currentUser.uid,
                    toUserId: toUserId,
                    text: text,
                    createdAt: new Date().toISOString(),
                    isAnonymous: true
                });
                showToast('Вопрос отправлен анонимно!', 'success');
                closeModal();
            } catch (error) {
                showToast('Ошибка отправки: ' + error.message, 'error');
            }
        }

        // Получить вопросы пользователя
        async function getUserQuestions(userId, type = 'received') {
            const questionsRef = collection(db, 'questions');
            let q;
            if (type === 'received') {
                q = query(questionsRef, where('toUserId', '==', userId), orderBy('createdAt', 'desc'));
            } else {
                q = query(questionsRef, where('fromUserId', '==', userId), orderBy('createdAt', 'desc'));
            }
            const snapshot = await getDocs(q);
            const questions = await Promise.all(snapshot.docs.map(async (docSnap) => {
                const data = docSnap.data();
                // Получаем данные отправителя/получателя
                if (type === 'received') {
                    const fromUser = await getUserData(data.fromUserId);
                    return { id: docSnap.id, ...data, fromUserName: fromUser ? `${fromUser.firstName} ${fromUser.lastName}` : 'Неизвестный' };
                } else {
                    const toUser = await getUserData(data.toUserId);
                    return { id: docSnap.id, ...data, toUserName: toUser ? `${toUser.firstName} ${toUser.lastName}` : 'Неизвестный' };
                }
            }));
            return questions;
        }

        // Получить данные пользователя
        async function getUserData(userId) {
            const userRef = doc(db, 'users', userId);
            const userSnap = await getDoc(userRef);
            return userSnap.exists() ? userSnap.data() : null;
        }

        // Админские функции
        async function getUnverifiedTelegramUsers() {
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('telegramVerified', '==', false));
            const snapshot = await getDocs(q);
            return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        }

        async function verifyTelegram(userId) {
            const userRef = doc(db, 'users', userId);
            await updateDoc(userRef, { telegramVerified: true });
            showToast('Telegram подтвержден', 'success');
            loadAdminPanel();
        }

        async function deleteQuestion(questionId) {
            await deleteDoc(doc(db, 'questions', questionId));
            showToast('Вопрос удален', 'success');
            loadAdminPanel();
        }

        async function getAllQuestionsAdmin() {
            const questionsRef = collection(db, 'questions');
            const snapshot = await getDocs(query(questionsRef, orderBy('createdAt', 'desc')));
            const questions = await Promise.all(snapshot.docs.map(async (docSnap) => {
                const data = docSnap.data();
                const fromUser = await getUserData(data.fromUserId);
                const toUser = await getUserData(data.toUserId);
                return {
                    id: docSnap.id,
                    ...data,
                    fromName: fromUser ? `${fromUser.firstName} ${fromUser.lastName} (${fromUser.email})` : 'Неизвестный',
                    toName: toUser ? `${toUser.firstName} ${toUser.lastName} (${toUser.email})` : 'Неизвестный'
                };
            }));
            return questions;
        }

        // Рендер секции авторизации
        function renderAuthSection() {
            const section = document.getElementById('auth-section');
            if (currentUser) {
                section.innerHTML = `
                    <div class="profile-info">
                        <div class="profile-avatar">${currentUserData?.firstName?.charAt(0) || 'U'}</div>
                        <span>${currentUserData?.firstName} ${currentUserData?.lastName}</span>
                        <button class="btn btn-secondary" onclick="window.logout()">Выйти</button>
                    </div>
                `;
            } else {
                section.innerHTML = `<button class="btn btn-primary" id="googleSignInBtn">Войти через Google</button>`;
                setTimeout(() => {
                    const btn = document.getElementById('googleSignInBtn');
                    if (btn) btn.onclick = signInWithGoogle;
                }, 100);
            }
        }

        // Основной контент
        function loadMainContent() {
            if (!currentUserData?.telegramVerified) {
                renderUnverifiedContent();
                return;
            }
            renderContent();
        }

        function renderUnverifiedContent() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="card" style="text-align: center;">
                    <h2>⏳ Ожидание подтверждения</h2>
                    <p>Ваш Telegram аккаунт еще не подтвержден администратором.</p>
                    <p>Пожалуйста, подождите или свяжитесь с администратором: <strong>sad.spotty@gmail.com</strong></p>
                </div>
            `;
        }

        let currentTab = 'ask';
        let currentSearchTerm = '';

        async function renderContent() {
            const content = document.getElementById('content');
            
            if (currentUser && currentUser.email === 'sad.spotty@gmail.com') {
                await loadAdminPanel();
                return;
            }
            
            if (!currentUserData?.telegramVerified) {
                renderUnverifiedContent();
                return;
            }
            
            content.innerHTML = `
                <div class="tabs">
                    <div class="tab ${currentTab === 'ask' ? 'active' : ''}" data-tab="ask">✍️ Задать вопрос</div>
                    <div class="tab ${currentTab === 'received' ? 'active' : ''}" data-tab="received">📥 Мои вопросы (${currentUser ? 'полученные' : ''})</div>
                    <div class="tab ${currentTab === 'sent' ? 'active' : ''}" data-tab="sent">📤 Отправленные вопросы</div>
                </div>
                <div id="tabContent"></div>
            `;
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.onclick = () => {
                    currentTab = tab.dataset.tab;
                    renderContent();
                };
            });
            
            const tabContent = document.getElementById('tabContent');
            
            if (currentTab === 'ask') {
                await renderAskTab(tabContent);
            } else if (currentTab === 'received') {
                await renderReceivedTab(tabContent);
            } else if (currentTab === 'sent') {
                await renderSentTab(tabContent);
            }
        }
        
        async function renderAskTab(container) {
            container.innerHTML = `
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск по имени или фамилии..." value="${currentSearchTerm}">
                </div>
                <div id="usersList" class="users-grid"></div>
            `;
            
            const searchInput = document.getElementById('searchInput');
            searchInput.oninput = async (e) => {
                currentSearchTerm = e.target.value;
                await loadUsersList();
            };
            
            await loadUsersList();
            
            async function loadUsersList() {
                const users = await searchUsers(currentSearchTerm);
                const filteredUsers = users.filter(user => user.id !== currentUser.uid);
                const usersList = document.getElementById('usersList');
                
                if (filteredUsers.length === 0) {
                    usersList.innerHTML = '<div class="card">Пользователи не найдены</div>';
                    return;
                }
                
                usersList.innerHTML = filteredUsers.map(user => `
                    <div class="user-card" data-userid="${user.id}" data-username="${user.firstName} ${user.lastName}">
                        <div class="user-name">${user.firstName} ${user.lastName}</div>
                        <button class="btn btn-primary ask-btn" style="margin-top: 10px;">Задать вопрос</button>
                    </div>
                `).join('');
                
                document.querySelectorAll('.ask-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        const card = e.target.closest('.user-card');
                        const userId = card.dataset.userid;
                        const userName = card.dataset.username;
                        openQuestionModal(userId, userName);
                    };
                });
            }
        }
        
        async function renderReceivedTab(container) {
            container.innerHTML = '<div class="loading">Загрузка вопросов...</div>';
            const questions = await getUserQuestions(currentUser.uid, 'received');
            
            if (questions.length === 0) {
                container.innerHTML = '<div class="card">Вам еще не задавали вопросы</div>';
                return;
            }
            
            container.innerHTML = questions.map(q => `
                <div class="question-item">
                    <div class="question-text">${escapeHtml(q.text)}</div>
                    <div class="question-meta">
                        <span>От: ${q.fromUserName}</span>
                        <span>${new Date(q.createdAt).toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }
        
        async function renderSentTab(container) {
            container.innerHTML = '<div class="loading">Загрузка вопросов...</div>';
            const questions = await getUserQuestions(currentUser.uid, 'sent');
            
            if (questions.length === 0) {
                container.innerHTML = '<div class="card">Вы еще не задавали вопросов</div>';
                return;
            }
            
            container.innerHTML = questions.map(q => `
                <div class="question-item">
                    <div class="question-text">${escapeHtml(q.text)}</div>
                    <div class="question-meta">
                        <span>Кому: ${q.toUserName}</span>
                        <span>${new Date(q.createdAt).toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }
        
        async function loadAdminPanel() {
            const content = document.getElementById('content');
            const unverifiedUsers = await getUnverifiedTelegramUsers();
            const allQuestions = await getAllQuestionsAdmin();
            
            content.innerHTML = `
                <h2>👑 Админ-панель</h2>
                <div class="admin-panel">
                    <h3>📱 Подтверждение Telegram (${unverifiedUsers.length})</h3>
                    <div class="admin-table">
                        <table>
                            <thead>
                                <tr><th>Имя Фамилия</th><th>Email</th><th>Telegram</th><th>Действие</th></tr>
                            </thead>
                            <tbody>
                                ${unverifiedUsers.map(user => `
                                    <tr><td>${user.firstName} ${user.lastName}</td><td>${user.email}</td><td>@${user.telegramNickname}</td>
                                    <td><button class="btn btn-primary verify-telegram" data-id="${user.id}">Подтвердить</button></td></tr>
                                `).join('')}
                                ${unverifiedUsers.length === 0 ? '<tr><td colspan="4">Нет пользователей на подтверждение</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div class="admin-panel">
                    <h3>❓ Все вопросы (${allQuestions.length})</h3>
                    <div class="admin-table">
                        <table>
                            <thead>
                                <tr><th>От кого</th><th>Кому</th><th>Вопрос</th><th>Дата</th><th>Действие</th></tr>
                            </thead>
                            <tbody>
                                ${allQuestions.map(q => `
                                    <tr><td>${escapeHtml(q.fromName)}</td><td>${escapeHtml(q.toName)}</td><td>${escapeHtml(q.text.substring(0, 100))}</td>
                                    <td>${new Date(q.createdAt).toLocaleString()}</td>
                                    <td><button class="btn btn-danger delete-question" data-id="${q.id}">Удалить</button></td></tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.verify-telegram').forEach(btn => {
                btn.onclick = () => verifyTelegram(btn.dataset.id);
            });
            
            document.querySelectorAll('.delete-question').forEach(btn => {
                btn.onclick = () => deleteQuestion(btn.dataset.id);
            });
        }
        
        function openQuestionModal(userId, userName) {
            selectedUser = { id: userId, name: userName };
            const modal = document.getElementById('questionModal');
            document.getElementById('modalTitle').innerHTML = `Задать вопрос ${userName}`;
            document.getElementById('questionText').value = '';
            modal.classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('questionModal').classList.remove('active');
            selectedUser = null;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Глобальные функции для onclick
        window.logout = logout;
        window.closeModal = closeModal;
        
        // Отправка вопроса
        document.addEventListener('click', (e) => {
            if (e.target.id === 'sendQuestionBtn') {
                if (selectedUser) {
                    const text = document.getElementById('questionText').value;
                    sendQuestion(selectedUser.id, text);
                }
            }
        });
        
        // Слушатель авторизации
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                const userData = await checkUserRegistration(user);
                currentUserData = userData;
                renderAuthSection();
                loadMainContent();
            } else {
                currentUserData = null;
                renderAuthSection();
                const content = document.getElementById('content');
                content.innerHTML = `
                    <div class="card" style="text-align: center;">
                        <h2>Добро пожаловать в HATERS ANON</h2>
                        <p>Задавайте анонимные вопросы другим пользователям</p>
                        <button class="btn btn-primary" id="landingSignIn">Войти через Google</button>
                    </div>
                `;
                setTimeout(() => {
                    const btn = document.getElementById('landingSignIn');
                    if (btn) btn.onclick = signInWithGoogle;
                }, 100);
            }
        });
    </script>
</body>
</html>
